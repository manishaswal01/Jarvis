<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jarvis UI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section id="MainUI">
        <div class="animation-container">
            <div class="central-wrapper">
                <div class="square">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
                <canvas id="canvasOne" width="500" height="500"></canvas>
            </div>
        </div>

        <h5 class="animate-text">Ask me anything</h5>

        <div class="bottom-ui">
            <div id="TextInput" class="input-container">
                <input type="text" class="input-field" id="chatbox" placeholder="type here...">
                <div class="button-group">
                    <button id="MicBtn" class="glow-on-hover"><i class="bi bi-mic"></i></button>
                    <button id="chatbtn" class="glow-on-hover"><i class="bi bi-chat-dots"></i></button>
                    <button id="settingBtn" class="glow-on-hover"><i class="bi bi-gear"></i></button>
                </div>
            </div>
        </div>
    </section>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.4/jquery.min.js"></script>
    <script type="text/javascript" src="/eel.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lettering.js/0.7.0/jquery.lettering.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/textillate/0.4.0/jquery.textillate.min.js"></script>
    <script src="script.js"></script>
    <script src="main.js"></script>
</body>
</html>
